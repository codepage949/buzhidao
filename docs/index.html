<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buzhidao - 화면 위 어디서나 바로 번역</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dkyun/buzhidao/main/icons/icon.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --bg-color: #0b0e14;
            --accent-primary: #ff79c6;
            --accent-secondary: #8be9fd;
            --accent-tertiary: #bd93f9;
            --text-main: #f8f8f2;
            --text-dim: #6272a4;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 121, 198, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 233, 253, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(189, 147, 249, 0.08) 0%, transparent 50%);
            filter: blur(80px);
        }

        .scroll-wrapper {
            height: 900vh;
            position: relative;
        }

        .sticky-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            z-index: 100;
            pointer-events: none;
            position: absolute;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }

        .hero h1 {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            padding-right: 0.1em; /* 끝 글자 잘림 방지 */
            background: linear-gradient(to right, #ff79c6, #bd93f9, #8be9fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .window-frame {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16 / 10;
            background: rgba(15, 17, 26, 0.7);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: translateY(100vh) scale(0.9);
            z-index: 10;
        }

        .window-header {
            height: 44px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .window-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .post-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            position: relative;
            z-index: 5;
        }

        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary)); }
        .user-name { font-weight: 700; color: var(--text-main); }
        .user-handle { color: var(--text-dim); font-size: 0.9rem; }

        .post-text {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
        }

        .keyword {
            color: var(--accent-secondary);
            text-decoration: underline wavy var(--accent-primary);
            text-underline-offset: 8px;
            display: inline-block;
            position: relative;
        }

        .loading-pill {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(189, 147, 249, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-tertiary);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(189, 147, 249, 0.3);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-tertiary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .scanner-glow {
            position: absolute;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(139, 233, 253, 0.1), transparent);
            border-top: 2px solid var(--accent-secondary);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
        }

        .ocr-box {
            position: absolute;
            border: 2px solid var(--accent-secondary);
            background: rgba(139, 233, 253, 0.1);
            border-radius: 8px;
            opacity: 0;
            z-index: 15;
            box-shadow: 0 0 15px rgba(139, 233, 253, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(139, 233, 253, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(139, 233, 253, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(139, 233, 253, 0.4); }
        }

        .cursor-svg {
            position: absolute;
            width: 32px;
            height: 32px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .translation-popup {
            position: absolute;
            background: rgba(40, 42, 54, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 210;
            opacity: 0;
            width: 200px;
            text-align: center;
        }

        .translation-result { font-size: 2rem; font-weight: 800; color: #fff; margin-top: 8px; }

        .scroll-hint {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            z-index: 100;
        }

        .mouse { width: 28px; height: 46px; border: 2px solid var(--text-dim); border-radius: 14px; position: relative; }
        .wheel { width: 4px; height: 8px; background: var(--accent-primary); position: absolute; top: 8px; left: 50%; transform: translateX(-50%); border-radius: 2px; animation: wheelScroll 2s infinite; }
        @keyframes wheelScroll { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, 20px); opacity: 0; } }

        footer { position: absolute; bottom: 0; width: 100%; padding: 40px; text-align: center; color: var(--text-dim); }
        footer a { color: var(--accent-secondary); text-decoration: none; }

        .top-actions {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .release-link,
        .github-corner {
            color: var(--text-main);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .release-link {
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .release-link:hover,
        .github-corner:hover {
            transform: scale(1.1) rotate(5deg);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-secondary);
        }

        .release-link:hover {
            transform: translateY(-1px);
        }

        .github-corner {
            padding: 10px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .window-frame { aspect-ratio: 1 / 1.4; width: 95%; }
            .post-text { font-size: 1.3rem; }
            .post-card { width: 90%; }
            .top-actions {
                top: 16px;
                right: 16px;
                gap: 8px;
            }
            .release-link {
                min-height: 38px;
                padding: 0 12px;
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body>
    <div class="mesh-gradient"></div>

    <div class="top-actions">
        <a
            href="https://github.com/codepage949/buzhidao/releases/latest"
            class="release-link"
            id="latest-release-link"
            aria-label="View latest release"
        >v0.2.0</a>
        <a href="https://github.com/codepage949/buzhidao" class="github-corner" aria-label="View source on GitHub">
            <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
        </a>
    </div>

    <div class="scroll-wrapper">
        <div class="sticky-container">
            <section class="hero" id="hero">
                <h1>buzhidao</h1>
                <p style="color: var(--text-dim); font-size: 1.4rem;">Don't let languages hold you back.</p>
            </section>

            <div class="window-frame" id="window">
                <div class="window-header">
                    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                </div>
                <div class="window-content" id="win-content">
                    <div class="scanner-glow" id="scanner"></div>

                    <div class="loading-pill" id="loader">
                        <div class="spinner"></div>
                        <span style="font-weight: 600; font-size: 0.9rem; color: #fff;">텍스트 인식 중...</span>
                    </div>

                    <div class="post-card" id="card">
                        <div class="user-info">
                            <div class="avatar"></div>
                            <div>
                                <div class="user-name">Modern Explorer</div>
                                <div class="user-handle">@explorer</div>
                            </div>
                        </div>
                        <div class="post-text" id="post-text">
                            Could be hype, <span class="keyword" id="target">不知道</span> honestly.
                        </div>
                        <div style="margin-top: 20px;">
                            <div style="height: 10px; width: 40%; background: rgba(255,255,255,0.05); border-radius: 5px; margin-bottom: 8px;"></div>
                            <div style="height: 10px; width: 25%; background: rgba(255,255,255,0.05); border-radius: 5px;"></div>
                        </div>
                    </div>

                    <div class="ocr-box" id="ocr-box"></div>

                    <div class="translation-popup" id="popup">
                        <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 800; letter-spacing: 0.1em; margin-bottom: 8px;">TRANSLATION</div>
                        <p class="translation-result" id="result"></p>
                    </div>

                    <svg class="cursor-svg" id="cursor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.83-4.83 3.06 7.27c.08.19.24.31.44.31h2.15c.33 0 .56-.34.42-.65L14.2 15.8h6.14c.32 0 .48-.39.25-.61L6.35 2.86c-.22-.22-.85-.07-.85.35z" fill="#fff" stroke="#000" stroke-width="1.5"/>
                    </svg>
                </div>
            </div>

            <div class="scroll-hint" id="hint">
                <div class="mouse"><div class="wheel"></div></div>
                <span>KEEP SCROLLING</span>
            </div>
        </div>
    </div>

    <footer id="footer" style="opacity: 0;">
        <p>&copy; 2026 buzhidao &bull; <a href="https://github.com/codepage949/buzhidao">GitHub Project</a></p>
    </footer>

    <script>
        const wrapper = document.querySelector('.scroll-wrapper');
        const hero = document.getElementById('hero');
        const windowFrame = document.getElementById('window');
        const scanner = document.getElementById('scanner');
        const loader = document.getElementById('loader');
        const ocrBox = document.getElementById('ocr-box');
        const target = document.getElementById('target');
        const cursor = document.getElementById('cursor');
        const popup = document.getElementById('popup');
        const result = document.getElementById('result');
        const hint = document.getElementById('hint');
        const footer = document.getElementById('footer');
        const card = document.getElementById('card');
        const latestReleaseLink = document.getElementById('latest-release-link');
        const latestReleaseFallback = {
            tagName: 'Releases',
            htmlUrl: 'https://github.com/codepage949/buzhidao/releases',
        };

        const translationText = "몰루🤪";
        const translationChars = [...translationText];

        applyLatestRelease(latestReleaseFallback);
        loadLatestRelease();

        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const maxScroll = wrapper.offsetHeight - window.innerHeight;
            const progress = Math.max(0, Math.min(1, scrollTop / maxScroll));
            render(progress);
        });

        function render(p) {
            // 1. Entry Phase (0.0 -> 0.25)
            if (p <= 0.25) {
                const ep = p / 0.25;
                hero.style.opacity = 1 - ep;
                hero.style.transform = `scale(${1 - ep * 0.1}) translateY(${-ep * 50}px)`;
                windowFrame.style.transform = `translateY(${(1 - ep) * 100}vh) scale(${0.9 + ep * 0.1})`;
                windowFrame.style.opacity = ep;
                hint.style.opacity = 1 - ep;
            } else {
                hero.style.opacity = 0;
                windowFrame.style.transform = `translateY(0) scale(1)`;
                windowFrame.style.opacity = 1;
                hint.style.opacity = 0;
            }

            // 2. Scan & Loading Phase (0.35 -> 0.55) - 0.25~0.35 구간은 텀(Pause)
            if (p > 0.35 && p <= 0.55) {
                const sp = (p - 0.35) / 0.2;
                scanner.style.opacity = 1;
                scanner.style.top = (sp * 100) + '%';
                
                if (p > 0.4 && p < 0.5) {
                    loader.style.opacity = 1;
                } else {
                    loader.style.opacity = 0;
                }
            } else {
                scanner.style.opacity = 0;
                loader.style.opacity = 0;
            }

            // 3. OCR Recognition (0.52 -> 0.67)
            if (p > 0.52) {
                const op = Math.min(1, (p - 0.52) / 0.15);
                ocrBox.style.opacity = op;
                ocrBox.style.top = (card.offsetTop + target.offsetTop - 4) + 'px';
                ocrBox.style.left = (card.offsetLeft + target.offsetLeft - 8) + 'px';
                ocrBox.style.width = (target.offsetWidth + 16) + 'px';
                ocrBox.style.height = (target.offsetHeight + 8) + 'px';
            } else {
                ocrBox.style.opacity = 0;
            }

            // 4. Cursor Movement (0.67 -> 0.82)
            if (p > 0.67) {
                const cp = Math.min(1, (p - 0.67) / 0.15);
                const startX = windowFrame.offsetWidth * 0.85;
                const startY = windowFrame.offsetHeight * 0.85;
                const targetX = card.offsetLeft + target.offsetLeft + (target.offsetWidth / 2);
                const targetY = card.offsetTop + target.offsetTop + (target.offsetHeight / 2);

                cursor.style.opacity = 1;
                cursor.style.left = (startX + (targetX - startX) * cp) + 'px';
                cursor.style.top = (startY + (targetY - startY) * cp) + 'px';
                cursor.style.transform = cp > 0.95 ? 'scale(0.85)' : 'scale(1)';
            } else {
                cursor.style.opacity = 0;
            }

            // 5. Result Phase (0.82 -> 1.0)
            if (p > 0.82) {
                const rp = (p - 0.82) / 0.18;
                popup.style.opacity = rp;
                popup.style.top = (card.offsetTop + target.offsetTop - 140) + 'px';
                popup.style.left = (card.offsetLeft + target.offsetLeft + 20) + 'px';
                popup.style.transform = `scale(${0.9 + rp * 0.1}) translateY(${(1 - rp) * 20}px)`;

                const typingP = Math.min(1, rp / 0.9);
                const charCount = Math.floor(typingP * translationChars.length);
                result.textContent = translationChars.slice(0, charCount).join('');
                footer.style.opacity = rp;
            } else {
                popup.style.opacity = 0;
                result.textContent = "";
                footer.style.opacity = 0;
            }
        }

        async function loadLatestRelease() {
            try {
                const response = await fetch('https://api.github.com/repos/codepage949/buzhidao/releases/latest', {
                    headers: {
                        Accept: 'application/vnd.github+json',
                    },
                });
                if (!response.ok) {
                    throw new Error(`GitHub API ${response.status}`);
                }
                const release = await response.json();
                if (!release.tag_name || !release.html_url) {
                    throw new Error('latest release payload missing fields');
                }
                applyLatestRelease({
                    tagName: release.tag_name,
                    htmlUrl: release.html_url,
                });
            } catch (error) {
                console.warn('latest release fetch failed', error);
            }
        }

        function applyLatestRelease(release) {
            latestReleaseLink.textContent = release.tagName;
            latestReleaseLink.href = release.htmlUrl;
            latestReleaseLink.setAttribute('aria-label', `View latest release ${release.tagName}`);
            latestReleaseLink.title = `${release.tagName} 릴리즈 페이지로 이동`;
        }

        render(0);
    </script>
</body>
</html>
