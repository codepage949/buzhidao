[project]
name = "buzhidao-server"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fastapi==0.110.0",
    "paddlepaddle-gpu==3.2.2",
    "paddleocr==3.3.0",
    "python-multipart==0.0.9",
    "python-dotenv==1.0.1",
    "uvicorn==0.29.0",
]

[dependency-groups]
dev = [
    "pytest==8.1.1",
    "httpx>=0.23.0,<0.27.0",
]

[tool.uv.sources]
paddlepaddle-gpu = { index = "paddlepaddle" }

[[tool.uv.index]]
name = "paddlepaddle"
url = "https://www.paddlepaddle.org.cn/packages/stable/cu118/"
explicit = true

[tool.pytest.ini_options]
testpaths = ["test_main.py"]
