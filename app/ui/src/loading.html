<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buzhidao</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      body {
        background: #1e1e2e;
        color: #cdd6f4;
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 20px;
        user-select: none;
        -webkit-user-select: none;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border: 3px solid #45475a;
        border-top-color: #89b4fa;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .label {
        line-height: 1.35;
      }
      .sub {
        color: #a6adc8;
        font-size: 12px;
        margin-top: 2px;
      }
      .error-icon {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
        color: #f38ba8;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        line-height: 22px;
      }
      .hidden {
        display: none;
      }
      .quit-btn {
        margin-top: 4px;
        padding: 4px 12px;
        border-radius: 4px;
        border: 1px solid #45475a;
        background: #313244;
        color: #cdd6f4;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .quit-btn:hover {
        background: #45475a;
      }
    </style>
  </head>
  <body>
    <div id="spinner" class="spinner"></div>
    <div id="error-icon" class="error-icon hidden">✕</div>
    <div>
      <div id="label" class="label">OCR 모델 로딩 중…</div>
      <div id="sub" class="sub">잠시만 기다려 주세요</div>
      <button id="quit-btn" class="quit-btn hidden" type="button">종료</button>
    </div>
    <script type="module" src="./loading.ts"></script>
  </body>
</html>
