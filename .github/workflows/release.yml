name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 태그 (예: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_sha.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag already exists: $version" >&2
            exit 1
          fi

      - name: Capture release SHA
        id: release_sha
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: windows
            arch: amd64
            flavor: cpu
            label: windows-amd64-cpu
            runner: windows-latest
            archive_format: zip
            app_binary: app/target/release/buzhidao.exe
            ocr_binary: ocr_server/dist/ocr_server/ocr_server.exe
            cargo_features: ""
          - os_name: windows
            arch: amd64
            flavor: gpu
            label: windows-amd64-gpu
            runner: windows-latest
            archive_format: zip
            app_binary: app/target/release/buzhidao.exe
            ocr_binary: ocr_server/dist/ocr_server/ocr_server.exe
            cargo_features: "--features gpu"
          - os_name: linux
            arch: amd64
            flavor: cpu
            label: linux-amd64-cpu
            runner: ubuntu-24.04
            archive_format: tar.gz
            app_binary: app/target/release/buzhidao
            ocr_binary: ocr_server/dist/ocr_server/ocr_server
            cargo_features: ""
          - os_name: linux
            arch: amd64
            flavor: gpu
            label: linux-amd64-gpu
            runner: ubuntu-24.04
            archive_format: tar.gz
            app_binary: app/target/release/buzhidao
            ocr_binary: ocr_server/dist/ocr_server/ocr_server
            cargo_features: "--features gpu"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libxdo-dev \
            libx11-dev \
            libxtst-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxfixes-dev \
            libevdev-dev \
            libclang-dev \
            libgbm-dev \
            libssl-dev \
            libgl1 \
            libgeos-dev \
            libgomp1 \
            libglib2.0-0

      - name: Build OCR server
        shell: bash
        working-directory: ocr_server
        run: |
          set -euo pipefail
          if [ "${{ matrix.flavor }}" = "gpu" ]; then
            uv sync -p 3.13 --group build --group gpu
            uv run --group build --group gpu python build.py --gpu
          else
            uv sync -p 3.13 --group build --group cpu
            uv run --group build --group cpu python build.py
          fi

      - name: Build frontend
        shell: bash
        working-directory: app/ui
        run: |
          set -euo pipefail
          deno install
          deno task build

      - name: Build desktop app
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          cargo build --release ${{ matrix.cargo_features }}

      - name: Prepare archives
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_helper.py make-archive \
            --version "${{ inputs.version }}" \
            --os "${{ matrix.os_name }}" \
            --arch "${{ matrix.arch }}" \
            --flavor "${{ matrix.flavor }}" \
            --app-binary "${{ matrix.app_binary }}" \
            --ocr-server-dir "$(dirname "${{ matrix.ocr_binary }}")" \
            --dist-dir dist \
            --component app \
            --format "${{ matrix.archive_format }}"
          python scripts/release_helper.py make-archive \
            --version "${{ inputs.version }}" \
            --os "${{ matrix.os_name }}" \
            --arch "${{ matrix.arch }}" \
            --flavor "${{ matrix.flavor }}" \
            --app-binary "${{ matrix.app_binary }}" \
            --ocr-server-dir "$(dirname "${{ matrix.ocr_binary }}")" \
            --dist-dir dist \
            --component ocr-server \
            --format "${{ matrix.archive_format }}"

      - name: Upload app archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.label }}-app
          path: |
            dist/buzhidao-${{ inputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}-${{ matrix.flavor }}-app.zip*
            dist/buzhidao-${{ inputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}-${{ matrix.flavor }}-app.tar.gz*
          if-no-files-found: error

      - name: Upload OCR server archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.label }}-ocr-server
          path: |
            dist/buzhidao-${{ inputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}-${{ matrix.flavor }}-ocr-server.zip*
            dist/buzhidao-${{ inputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}-${{ matrix.flavor }}-ocr-server.tar.gz*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download archives
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          previous_tag="$(git tag --sort=-creatordate | head -n 1 || true)"
          {
            echo "# ${version}"
            echo
            echo "## 설치 방법"
            echo
            echo "GitHub Release 자산은 파일 크기 제한 때문에 플랫폼별로 \`app\`과 \`ocr-server\` 두 개로 분리되어 있습니다."
            echo
            echo "- \`buzhidao-${version}-<os>-<arch>-<flavor>-app.zip\` 또는 \`.tar.gz\`"
            echo "- \`buzhidao-${version}-<os>-<arch>-<flavor>-ocr-server.zip\` 또는 \`.tar.gz\`"
            echo
            echo "같은 OS, 같은 아키텍처, 같은 flavor(\`cpu\` 또는 \`gpu\`) 조합의 두 자산을 함께 내려받아 같은 디렉터리에 압축 해제하세요."
            echo
            echo "압축 해제 후 최종 구조는 아래와 같아야 합니다."
            echo
            echo "- Windows: \`buzhidao.exe\` 와 \`ocr_server/\` 가 같은 상위 디렉터리에 위치"
            echo "- Linux: \`buzhidao\` 와 \`ocr_server/\` 가 같은 상위 디렉터리에 위치"
            echo
            echo "예시:"
            echo
            echo "- \`buzhidao-${version}-windows-amd64-gpu-app.zip\`"
            echo "- \`buzhidao-${version}-windows-amd64-gpu-ocr-server.zip\`"
            echo
            echo "## 분할 파일(.part001 등)이 있는 경우"
            echo
            echo "일부 GPU 자산은 2 GiB 제한 때문에 \`.part001\`, \`.part002\`처럼 분할되어 업로드될 수 있습니다."
            echo "이 경우 먼저 조각 파일을 원래 아카이브 하나로 합친 뒤 압축을 해제하세요."
            echo
            echo "### Windows (PowerShell)"
            echo
            echo '```powershell'
            echo '$parts = Get-ChildItem .\buzhidao-...zip.part* | Sort-Object Name'
            echo '$out = [System.IO.File]::Create(".\buzhidao-...zip")'
            echo 'foreach ($part in $parts) {'
            echo '  $bytes = [System.IO.File]::ReadAllBytes($part.FullName)'
            echo '  $out.Write($bytes, 0, $bytes.Length)'
            echo '}'
            echo '$out.Close()'
            echo '```'
            echo
            echo "### Linux"
            echo
            echo '```bash'
            echo 'cat buzhidao-...tar.gz.part* > buzhidao-...tar.gz'
            echo '```'
            echo
            if [ -n "$previous_tag" ]; then
              echo "## Changes since ${previous_tag}"
              echo
              git log --oneline "${previous_tag}..HEAD"
            else
              echo "## Changes"
              echo
              git log --oneline
            fi
          } > RELEASE_NOTES.md

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ inputs.version }}" "${{ needs.prepare.outputs.release_sha }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -type f \( -name '*.zip' -o -name '*.zip.part*' -o -name '*.tar.gz' -o -name '*.tar.gz.part*' \) | sort)
          gh release create "${{ inputs.version }}" \
            "${assets[@]}" \
            --title "${{ inputs.version }}" \
            --notes-file RELEASE_NOTES.md
